<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes scaleIn {
        0% {
          transform: scale(0);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      
      .tick-bg {
        animation: scaleIn 0.6s cubic-bezier(0.36, 0, 0.66, 1) forwards;
        transform-origin: center;
      }
      
      @keyframes drawTick {
        0% {
          stroke-dasharray: 60;
          stroke-dashoffset: 60;
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          stroke-dasharray: 60;
          stroke-dashoffset: 0;
          opacity: 1;
        }
      }
      
      .tick-check {
        animation: drawTick 0.8s ease-out 0.2s forwards;
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
        opacity: 0;
      }
    </style>
  </defs>
  
  <!-- Green circular background -->
  <circle class="tick-bg" cx="50" cy="50" r="48" fill="#4a7c59"/>
  
  <!-- White checkmark -->
  <polyline class="tick-check" points="28,50 42,64 72,34" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

